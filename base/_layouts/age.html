<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Verification</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 20px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .enter {
      background: #f59b25;
      color: #000;
    }

    .enter:hover {
      background: #ff7515;
    }

    .exit {
      background: #222;
      color: #aaa;
    }

    .exit:hover {
      background: #333;
      color: #fff;
	  
	  body {
  opacity: 0;
  animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
    }
  </style>
</head>
<body>

  {{ content }}

</body>
</html>
